name: Release on PR Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build mod
        run: ./gradlew build

      - name: Read mod version
        id: mod_version
        run: |
          version=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2 | xargs)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.mod_version.outputs.version }}-${{ github.event.pull_request.number }}
          name: v${{ steps.mod_version.outputs.version }} (PR #${{ github.event.pull_request.number }})
          body: |
            Automated release from PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}
          files: build/libs/*.jar
